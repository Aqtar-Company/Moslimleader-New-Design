name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build Next.js app
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.JWT_SECRET }}
          NEXTAUTH_URL: https://moslimleader.com

      - name: Create deployment zip
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "node_modules/*" \
            --exclude ".DS_Store" \
            --exclude ".env.local" \
            --exclude "*.log"
          echo "Zip created: $(du -sh deploy.zip)"

      - name: Upload zip via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp -qq

          lftp -u "$FTP_USERNAME,$FTP_PASSWORD" "$FTP_SERVER" <<FTPEOF
          set ftp:passive-mode yes
          set ftp:ssl-allow true
          set ssl:verify-certificate false
          set net:timeout 180
          set net:max-retries 3

          put deploy.zip -o public_html/deploy.zip

          bye
          FTPEOF

          echo "✅ Zip uploaded to Hostinger successfully!"
          echo "⚠️  Please go to Hostinger hPanel → Deployments → Settings and redeploy to complete the deployment."
