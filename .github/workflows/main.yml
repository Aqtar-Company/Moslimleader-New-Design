name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build Next.js
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.JWT_SECRET }}
          NEXTAUTH_URL: https://moslimleader.com

      # The turbopack build creates a symlink:
      # .next/node_modules/@prisma/client-HASH -> ../../../node_modules/@prisma/client
      # FTP uploads the symlink but not the target, causing "Cannot find module" error.
      # Fix: replace the symlink with the actual directory content before uploading.
      - name: Resolve Prisma symlink in .next/node_modules
        run: |
          PRISMA_LINK=$(ls .next/node_modules/@prisma/ 2>/dev/null | head -1)
          if [ -n "$PRISMA_LINK" ]; then
            echo "Found Prisma symlink: $PRISMA_LINK"
            LINK_PATH=".next/node_modules/@prisma/$PRISMA_LINK"
            REAL_PATH=$(readlink -f "$LINK_PATH")
            echo "Resolving symlink: $LINK_PATH -> $REAL_PATH"
            rm "$LINK_PATH"
            cp -r "$REAL_PATH" "$LINK_PATH"
            echo "Symlink resolved to real directory"
            ls "$LINK_PATH" | head -5
          else
            echo "No Prisma symlink found, skipping"
          fi

      # Deploy: exclude node_modules (not needed since .next/node_modules has the Prisma client)
      - name: Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: public_html/new/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/node_modules/**
            **/.next/cache/**
            **/prisma/migrations/**
            **/*.md
            **/.DS_Store
