name: Deploy to Hostinger (Node.js)

on:
  push:
    branches:
      - main
      - claude/**

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy files via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          echo "machine $FTP_SERVER login $FTP_USERNAME password $FTP_PASSWORD" > ~/.netrc
          chmod 600 ~/.netrc

          lftp "$FTP_SERVER" <<FTPEOF
          set ftp:passive-mode yes
          set ftp:ssl-allow true
          set ssl:verify-certificate false
          set net:timeout 60
          set net:max-retries 5

          mirror --reverse --verbose \
            --exclude .git/ \
            --exclude node_modules/ \
            --exclude .DS_Store \
            --exclude .env \
            ./ $APP_DIR/

          bye
          FTPEOF

      - name: Run DB migrations + restart app via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd ${{ secrets.APP_DIR }}
            npm install
            npx prisma migrate deploy
            npm prune --omit=dev
            # Hostinger Node.js apps auto-restart when files change
            # If using PM2:
            # pm2 restart moslimleader || pm2 start npm --name moslimleader -- start
