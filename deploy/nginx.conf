server {
    listen 80;
    listen [::]:80;
    server_name moslimleader.com www.moslimleader.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name moslimleader.com www.moslimleader.com;

    # ── SSL (Let's Encrypt) ──────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/moslimleader.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/moslimleader.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Root: Next.js static export ─────────────────────────────
    root /var/www/moslimleader/out;
    index index.html;

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # ── Cache static assets ──────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Next.js static files ─────────────────────────────────────
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA routing: serve index.html for all routes ─────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ── WordPress wp-content images (still served from WordPress folder) ─
    # إذا الصور لسه على نفس السيرفر، استخدم هذا الـ block:
    # location /wp-content/uploads/ {
    #     root /var/www/wordpress;
    # }
}
