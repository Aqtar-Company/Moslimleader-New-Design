name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - claude/**

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Remove API routes (not needed for static export)
        run: mv src/app/api /tmp/api-bak

      - name: Build static export
        run: npm run build
        env:
          NODE_ENV: production

      - name: Restore API routes
        run: mv /tmp/api-bak src/app/api

      - name: Verify out/ folder exists
        run: ls -la out/ | head -20

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy to Hostinger
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "machine $FTP_SERVER login $FTP_USERNAME password $FTP_PASSWORD" > ~/.netrc
          chmod 600 ~/.netrc

          lftp "$FTP_SERVER" <<'FTPEOF'
          set ftp:passive-mode yes
          set ftp:ssl-allow true
          set ssl:verify-certificate false
          set net:timeout 60
          set net:max-retries 5

          mirror --reverse --delete --verbose \
            --exclude .git \
            --exclude .DS_Store \
            ./out/ /public_html/

          mirror --reverse --verbose \
            --exclude .git \
            --exclude .DS_Store \
            ./public/wp-content/ /public_html/wp-content/

          bye
          FTPEOF
